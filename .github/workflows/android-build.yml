name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Decode upload keystore
        if: env.UPLOAD_KEYSTORE_BASE64 != ''
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          printf "%s" "$UPLOAD_KEYSTORE_BASE64" | base64 --decode > upload-keystore.jks

      - name: Build debug APK and release AAB
        env:
          UPLOAD_KEYSTORE_FILE: ${{ github.workspace }}/upload-keystore.jks
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: gradle clean :app:assembleDebug :app:bundleRelease --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: roaming-helper-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: roaming-helper-release-aab
          path: app/build/outputs/bundle/release/*.aab
